<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mossline — закрытая бета</title>
  <meta name="description" content="Промо-экран закрытой беты Mossline: AI-рабочее пространство для быстрых продуктовых команд.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
    @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background-color: #000000;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      color: #ffffff;
      cursor: none;
    }
    a { cursor: none; }

    #top-gradient {
      position: fixed;
      top: -30vh;
      left: 0;
      width: 100vw;
      height: auto;
      display: block;
      z-index: 0;
      pointer-events: none;
      opacity: 0.98;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 6vh;
      width: 95%;
      max-width: 1100px;
      margin: 0 auto;
    }
    .hero-kicker {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.54);
      margin-bottom: 1.1rem;
    }
    .hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.55rem, 5.1vw, 5.15rem);
      font-weight: 400;
      color: #ffffff;
      line-height: 1.05;
      margin-bottom: 2.2rem;
      letter-spacing: -0.025em;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .hero-title .word-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      padding-bottom: 0.15em;
      margin-bottom: -0.15em;
    }
    .hero-title .word-inner {
      display: inline-block;
      opacity: 0;
      transform: translateY(105%);
      filter: blur(20px);
      animation: word-reveal-mask 1.3s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
    }
    @keyframes word-reveal-mask {
      0% { opacity: 0; transform: translateY(105%); filter: blur(20px); }
      30% { opacity: 1; }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .beta-status {
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,.78);
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: .9rem 1.3rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 9999px;
      background: rgba(0,0,0,.42);
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.36);
      cursor: pointer;
      text-decoration: none;
      transition: transform .25s ease, border-color .25s ease, background .25s ease;
    }
    .beta-status:hover {
      transform: translateY(-2px);
      border-color: rgba(57, 255, 20, 0.42);
      background: rgba(8, 18, 10, .58);
    }
    .blinking-dot {
      width: 10px;
      height: 10px;
      background-color: #39FF14;
      border-radius: 50%;
      position: relative;
      display: inline-block;
      animation: pulse-glow 2s infinite ease-in-out;
    }
    .blinking-dot::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      background-color: rgba(57, 255, 20, 0.45);
      border-radius: 50%;
      animation: wave-expand 2s infinite ease-in-out;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.5; transform: scale(0.85); box-shadow: 0 0 4px rgba(57, 255, 20, 0.3); }
      50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px rgba(57, 255, 20, 0.9); }
    }
    @keyframes wave-expand {
      0% { transform: scale(0.6); opacity: 0.9; }
      100% { transform: scale(2.3); opacity: 0; }
    }

    .product-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      font-family: 'General Sans', -apple-system, sans-serif;
    }
    .product-board {
      position: absolute;
      left: 50%;
      top: 30vh;
      width: min(780px, calc(100vw - 40px));
      transform: translateX(-50%);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.38);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
      animation: board-float-in 1.35s cubic-bezier(.05,.9,.1,1) both;
    }
    .board-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }
    @keyframes float-in {
      from { opacity: 0; transform: translateY(22px); filter: blur(16px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes board-float-in {
      from { opacity: 0; transform: translate(-50%, 22px); filter: blur(16px); }
      to { opacity: 1; transform: translate(-50%, 0); filter: blur(0); }
    }
    .board-label {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,.48);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .board-title {
      margin-top: 10px;
      color: #fff;
      font-size: clamp(1.45rem, 3vw, 2.4rem);
      line-height: 1.02;
      letter-spacing: -.055em;
    }
    .board-copy {
      max-width: 34rem;
      margin-top: 10px;
      color: rgba(255,255,255,.56);
      font-size: .94rem;
      line-height: 1.55;
    }
    .board-live {
      min-width: 132px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(57,255,20,.08);
      color: #fff;
      text-align: right;
      box-shadow: inset 0 0 0 1px rgba(57,255,20,.18);
    }
    .board-live span {
      display: block;
      color: rgba(255,255,255,.46);
      font-size: .62rem;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    .board-live strong {
      display: block;
      margin-top: 3px;
      font-size: 1.8rem;
      letter-spacing: -.06em;
      color: #39FF14;
      text-shadow: 0 0 8px rgba(57,255,20,.45);
    }
    .board-label::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #39FF14;
      box-shadow: 0 0 14px rgba(57,255,20,.9);
    }
    .board-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .board-stat {
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      padding: 14px;
    }
    .board-stat strong {
      display: block;
      color: #fff;
      font-size: 1.55rem;
      letter-spacing: -.055em;
    }
    .board-stat span {
      display: block;
      margin-top: 4px;
      color: rgba(255,255,255,.46);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      white-space: nowrap;
    }
    .board-flow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      display: grid;
      margin-top: 8px;
    }
    .flow-step {
      position: relative;
      min-height: 72px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      padding: 14px;
      overflow: hidden;
      color: rgba(255,255,255,.78);
      font-size: .88rem;
    }
    .flow-step::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg,#39FF14,rgba(255,255,255,.75));
      animation: flowBar 2.2s cubic-bezier(.05,.9,.1,1) infinite alternate;
    }
    .flow-step:nth-child(2)::after { animation-delay: -.55s; }
    .flow-step:nth-child(3)::after { animation-delay: -1.1s; }
    @keyframes flowBar { from { transform: scaleX(.2); transform-origin:left; opacity:.55 } to { transform: scaleX(1); transform-origin:left; opacity:1 } }

    .footer-container {
      position: fixed;
      top: 50vh;
      left: 20px;
      right: 20px;
      width: calc(100vw - 40px);
      transform: translateY(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
    }
    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      padding: 0 5px;
    }
    .footer-title {
      font-family: 'General Sans', -apple-system, sans-serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.015em;
      margin: 0;
    }
    .footer-divider {
      border: none;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.2);
      margin: 1.6rem 0;
      width: 100%;
    }
    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 5px;
    }
    .footer-socials {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      flex: 1;
    }
    .social-icon {
      color: rgba(255, 255, 255, 0.55);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
    }
    .social-icon:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }
    .footer-links {
      display: flex;
      gap: 2.8rem;
      justify-content: center;
      align-items: center;
      flex: 2;
    }
    .footer-link {
      display: inline-block;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.3s ease, transform 0.3s ease;
      cursor: pointer;
    }
    .footer-copyright {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      text-align: right;
      flex: 1;
      letter-spacing: 0.02em;
    }

    .footer-logo-wrap {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3;
      margin: 0;
    }
    .footer-logo-text {
      font-family: 'General Sans', -apple-system, sans-serif;
      font-size: 20.4vw;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.045em;
      margin-right: -0.045em;
      transform: translateX(-20px);
      line-height: 0.8;
      text-align: center;
      width: 100%;
      pointer-events: none;
      opacity: 0.95;
      white-space: nowrap;
    }
    .footer-logo-text .letter-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      line-height: 0.8;
    }
    .footer-logo-text .letter-inner {
      display: inline-block;
      opacity: 0;
      transform: translateX(-105%);
      filter: blur(20px);
      animation: letter-reveal-mask 1.2s cubic-bezier(0.05, 0.9, 0.1, 1) forwards;
    }
    @keyframes letter-reveal-mask {
      0% { opacity: 0; transform: translateX(-105%); filter: blur(20px); }
      25% { opacity: 1; }
      100% { opacity: 0.95; transform: translateX(0); filter: blur(0); }
    }

    .video-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 90vh;
      overflow: hidden;
      z-index: -1;
    }
    #bg-video {
      width: 100%;
      height: 110%;
      object-fit: cover;
      display: block;
      transform: translateY(0%);
      filter: saturate(1.04) contrast(1.05);
    }

    .glass-cursor-card {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 99999;
      pointer-events: none;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 9999px;
      box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      will-change: transform, opacity;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  background 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-cursor-card.active { opacity: 1; }
    .cursor-card-text {
      font-family: 'General Sans', -apple-system, sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #39FF14;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.45);
    }
    .cursor-card-text .text-white {
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
    }
    .cursor-ring-outline {
      position: fixed;
      top: 0;
      left: 0;
      width: 48px;
      height: 48px;
      border: 1.5px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      z-index: 99998;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      will-change: transform, opacity;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
    }
    .cursor-ring-outline.active { opacity: 1; }
    .cursor-ring-outline.expanded { border-color: rgba(255, 255, 255, 0.15); }

    @media (max-width: 760px) {
      body, a { cursor: auto; }
      .glass-cursor-card, .cursor-ring-outline { display: none; }
      .product-layer { display: block; }
      .product-board { top: 27vh; width: calc(100vw - 28px); padding: 10px; border-radius: 20px; }
      .board-top { grid-template-columns: 1fr; gap: 10px; }
      .board-label { font-size: .56rem; }
      .board-title { font-size: 1.15rem; margin-top: 7px; }
      .board-copy { font-size: .68rem; line-height: 1.4; margin-top: 6px; max-width: 26rem; }
      .board-live { position:absolute; right:10px; top:10px; min-width:auto; padding:8px 10px; border-radius:14px; }
      .board-live span { font-size:.5rem; }
      .board-live strong { font-size:1.1rem; }
      .board-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
      .board-stat { padding: 8px; border-radius: 14px; }
      .board-stat strong { font-size: 1rem; }
      .board-stat span { font-size: .5rem; letter-spacing: .06em; }
      .board-flow { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .flow-step { min-height: 46px; padding: 9px 8px; border-radius: 14px; font-size: .62rem; }
      .flow-step::after { left:8px; right:8px; bottom:8px; height:4px; }
      .hero-content { padding-top: 7vh; }
      .hero-title { font-size: clamp(2.35rem, 12vw, 4.4rem); }
      .footer-container { top: 60vh; }
      .footer-top, .footer-bottom { align-items: flex-start; flex-direction: column; gap: 1rem; }
      .footer-links { flex-wrap: wrap; justify-content: flex-start; gap: 1rem 1.45rem; }
      .footer-copyright { text-align: left; }
      .footer-logo-text { font-size: 24vw; transform: translateX(-8px); }
    }
  </style>
</head>
<body>
  <img src="https://api.getlayers.ai/storage/v1/object/public/public/assets/loopstack-f8c64439bf/black_gradient.svg" alt="Верхний градиент" id="top-gradient">

  <main class="hero-content">
    <div class="hero-kicker">AI workspace / закрытая бета</div>
    <h1 class="hero-title">Подайте заявку <br> на ранний доступ</h1>
    <div class="beta-status" aria-label="Статус закрытой беты">
      <span class="btn-text">Закрытая бета активна</span>
      <span class="blinking-dot"></span>
    </div>
  </main>

  <footer class="footer-container">
    <div class="footer-top">
      <h2 class="footer-title">Оставайтесь на связи</h2>
      <h2 class="footer-title quote">Думай. Собирай. Повторяй.</h2>
    </div>
    <hr class="footer-divider">
    <div class="footer-bottom">
      <div class="footer-socials">
        <span aria-label="LinkedIn" class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
        </span>
        <span aria-label="X" class="social-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"></path><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path></svg>
        </span>
        <span aria-label="Instagram" class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </span>
      </div>
      <div class="footer-links" aria-label="Разделы кейса">
        <span class="footer-link">Продукт</span>
        <span class="footer-link">Сигналы</span>
        <span class="footer-link">Команды</span>
        <span class="footer-link">Контекст</span>
      </div>
      <div class="footer-copyright">© 2026 Mossline</div>
    </div>
  </footer>

  <div class="footer-logo-wrap">
    <h2 class="footer-logo-text">Mossline</h2>
  </div>

  <div class="video-container">
    <video autoplay muted playsinline loop id="bg-video">
      <source src="https://api.getlayers.ai/storage/v1/object/public/public/assets/loopstack-f8c64439bf/flower.mp4" type="video/mp4">
      Ваш браузер не поддерживает видео.
    </video>
  </div>

  <div id="cursor-ring" class="cursor-ring-outline"></div>
  <div id="glass-card" class="glass-cursor-card">
    <span class="cursor-card-text"><span class="text-white">Say</span> Hello!</span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const wireLink = (element, href) => {
        if (!element) return;
        element.setAttribute('role', 'link');
        element.setAttribute('tabindex', '0');
        const open = () => {
          if (href.startsWith('http')) {
            window.open(href, '_blank', 'noopener');
          } else {
            window.location.href = href;
          }
        };
        element.addEventListener('click', open);
        element.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            open();
          }
        });
      };

      wireLink(document.querySelector('.beta-status'), 'index.html#brief');
      document.querySelectorAll('.social-icon').forEach((item) => wireLink(item, 'https://t.me/Reyrocodez'));
      ['index.html#level', 'index.html#process', 'index.html#team', 'index.html#brief'].forEach((href, index) => {
        wireLink(document.querySelectorAll('.footer-link')[index], href);
      });

      const logoText = document.querySelector('.footer-logo-text');
      if (logoText) {
        const text = logoText.textContent.trim();
        logoText.innerHTML = '';
        [...text].forEach((char, index) => {
          const wrapper = document.createElement('span');
          wrapper.className = 'letter-wrapper';
          const inner = document.createElement('span');
          inner.textContent = char === ' ' ? '\u00a0' : char;
          inner.className = 'letter-inner';
          inner.style.animationDelay = `${index * 0.09}s`;
          wrapper.appendChild(inner);
          logoText.appendChild(wrapper);
        });
      }

      const heroTitle = document.querySelector('.hero-title');
      if (heroTitle) {
        const text = heroTitle.innerHTML;
        const parts = text.split(/(\s+|<br\s*\/?>)/i);
        heroTitle.innerHTML = '';
        let wordIndex = 0;
        parts.forEach(part => {
          if (part.trim() === '') {
            heroTitle.appendChild(document.createTextNode(' '));
          } else if (part.toLowerCase().startsWith('<br')) {
            heroTitle.appendChild(document.createElement('br'));
          } else {
            const wrapper = document.createElement('span');
            wrapper.className = 'word-wrapper';
            const inner = document.createElement('span');
            inner.className = 'word-inner';
            inner.textContent = part;
            inner.style.animationDelay = `${wordIndex * 0.1}s`;
            wordIndex++;
            wrapper.appendChild(inner);
            heroTitle.appendChild(wrapper);
          }
        });
      }

      const glassCard = document.getElementById('glass-card');
      const cursorRing = document.getElementById('cursor-ring');
      if (glassCard && cursorRing && window.matchMedia('(pointer:fine)').matches) {
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cardX = mouseX;
        let cardY = mouseY;
        let ringX = mouseX;
        let ringY = mouseY;
        let isFirstMove = true;
        let scale = 0;
        let targetScale = 0;
        let isHoveringBtn = false;

        document.addEventListener('mousemove', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
          if (isFirstMove) {
            cardX = mouseX;
            cardY = mouseY;
            ringX = mouseX;
            ringY = mouseY;
            isFirstMove = false;
            glassCard.classList.add('active');
            cursorRing.classList.add('active');
          }
          if (!isHoveringBtn) targetScale = 1;
        });
        document.addEventListener('mouseleave', () => { targetScale = 0; });
        document.addEventListener('mouseenter', () => { if (!isHoveringBtn) targetScale = 1; });

        const heroBtn = document.querySelector('.hero-btn');
        if (heroBtn) {
          heroBtn.addEventListener('mouseenter', () => {
            isHoveringBtn = true;
            targetScale = 0;
            cursorRing.classList.add('expanded');
          });
          heroBtn.addEventListener('mouseleave', () => {
            isHoveringBtn = false;
            targetScale = 1;
            cursorRing.classList.remove('expanded');
          });
        }

        const updatePhysics = () => {
          cardX += (mouseX - cardX) * 0.08;
          cardY += (mouseY - cardY) * 0.08;
          ringX = mouseX;
          ringY = mouseY;
          scale += (targetScale - scale) * 0.15;
          const currentRingScale = cursorRing.classList.contains('expanded') ? 1.6 * Math.max(scale, 0.62) : scale;
          glassCard.style.transform = `translate3d(${cardX}px, ${cardY}px, 0) translate(-50%, -50%) scale(${scale})`;
          cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%) scale(${currentRingScale})`;
          requestAnimationFrame(updatePhysics);
        };
        updatePhysics();
      }
    });
  </script>
</body>
</html>
